name: publish base image 
on:
  push:
    branches:
      - main
    paths:
      - 'base-image/**'
      - .github/workflows/publish-toolset.yml

permissions:
  contents: read
  packages: write

jobs:
  publish-base-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io 
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Base Image # build and push the base image to GitHub Container Registry
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/helm-base:latest ./base-image
          docker push ghcr.io/${{ github.repository_owner }}/helm-base:latest

          